name: CI
on:
  push:
    branches:
      - '*'
    paths-ignore:
      - '.gitignore'
      - '**.md'
      - 'LICENSE'
      - '.github/dependabot.yml'

  pull_request:
    branches:
      - '*'
    paths-ignore:
      - '.gitignore'
      - '**.md'
      - 'LICENSE'
      - '.github/dependabot.yml'

jobs:

  perf-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:

          - name: "5-tomcats-4-disable"
            env: |
              TOMCAT_COUNT=5
              DISABLE_RANDOMLY=4
              HTTPD_LOG_LEVEL=debug

          - name: "2-tomcats-1-disable"
            env: |
              TOMCAT_COUNT=2
              DISABLE_RANDOMLY=1
              HTTPD_LOG_LEVEL=debug

          - name: "15-tomcats-15-disable"
            env: |
              TOMCAT_COUNT=15
              HTTPD_LOG_LEVEL=debug
              DISABLE_RANDOMLY=15

          - name: "20-tomcats-15-disable"
            env: |
              TOMCAT_COUNT=20
              HTTPD_LOG_LEVEL=debug
              DISABLE_RANDOMLY=15

          - name: "75-tomcats-65-disable"
            env: |
              TOMCAT_COUNT=75
              DISABLE_RANDOMLY=65

          - name: "20-tomcats-10-disable"
            env: |
              TOMCAT_COUNT=20
              DISABLE_RANDOMLY=10
              HTTPD_LOG_LEVEL=debug

          - name: "50-tomcats-45-disable"
            env: |
              TOMCAT_COUNT=50
              DISABLE_RANDOMLY=45

          - name: "50-tomcats-30-disable"
            env: |
              TOMCAT_COUNT=50
              DISABLE_RANDOMLY=30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Checkout submodules
        run: git submodule update --init --recursive
      - name: Set environment variables
        run: echo "${{ matrix.env }}" >> $GITHUB_ENV
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Get dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install podman-docker gcc maven git curl iproute2 wcstools g++-12 cmake liblist-moreutils-perl
      - name: Setup  performance tests
        run: sh setup.sh
      - name: Run performance tests
        run: sh run.sh
      - name: Make a summary of test runs
        run: |
          perl summary.pl output/ | tee summary && cp summary output/summary-for-${{ matrix.name }}
      - name: Preserve output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Output-for-${{ matrix.name }}
          path: output/*

